
models:
  - name: gpt-4
    display_name: GPT-4
    model: gpt-4o-mini
    api_key: $OPENAI_API_KEY 
    base_url: $OPENAI_API_BASE_URL
    max_tokens: 6384
    temperature: 0.7
    supports_vision: true


dbs:
  - name: sqlite
    path: ./smallclaw.db
  - name: postgres
    server: $POSTGRES_SERVER
    db: $POSTGRES_DB
    port: $POSTGRES_PORT
    user: $POSTGRES_USER
    password: $POSTGRES_PASSWORD # Change this to your pwd




